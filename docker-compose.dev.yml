## Local development stack - MinIO only
## Backend + Frontend still run via npm (outside Docker)
##
## Usage:
##   docker compose -f docker-compose.dev.yml up -d
##   docker compose -f docker-compose.dev.yml down

services:
  minio:
    image: minio/minio:latest
    container_name: minio-dev
    ports:
      - "9000:9000"   # MinIO S3 API  (backend talks to this)
      - "9001:9001"   # MinIO Console  (browser admin UI)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_dev_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  minio_dev_data:
    driver: local
